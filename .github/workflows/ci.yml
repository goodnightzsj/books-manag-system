name: CI · static checks

# Runs on PR and pushes to main. NEVER builds artifacts -- catches type and
# unit-test regressions before tag-triggered native builds would notice.

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "llmdoc/**"
      - ".github/RELEASE_BODY.md"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  admin-web:
    name: admin-web typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/admin-web/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit

  reader-web:
    name: reader-web typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/reader-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/reader-web/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
