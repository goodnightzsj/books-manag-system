services:
  postgres:
    image: postgres:16-alpine
    container_name: books-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-books_db}
      POSTGRES_USER: ${POSTGRES_USER:-books_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-books_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-books_user} -d ${POSTGRES_DB:-books_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: books-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: books-api
    environment:
      APP_ROLE: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-books_user}:${POSTGRES_PASSWORD:-books_pass}@postgres:5432/${POSTGRES_DB:-books_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-please-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      BOOKS_DIR: /app/books
      UPLOADS_DIR: /app/uploads
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      MEILI_URL: ${MEILI_URL:-}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
    volumes:
      - ./books:/app/books
      - ./uploads:/app/uploads
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: books-worker
    environment:
      APP_ROLE: worker
      DATABASE_URL: postgresql://${POSTGRES_USER:-books_user}:${POSTGRES_PASSWORD:-books_pass}@postgres:5432/${POSTGRES_DB:-books_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-please-change-me}
      BOOKS_DIR: /app/books
      UPLOADS_DIR: /app/uploads
      CELERY_QUEUES: ${CELERY_QUEUES:-scan,enrich,maintenance}
    volumes:
      - ./books:/app/books
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: books-beat
    environment:
      APP_ROLE: beat
      DATABASE_URL: postgresql://${POSTGRES_USER:-books_user}:${POSTGRES_PASSWORD:-books_pass}@postgres:5432/${POSTGRES_DB:-books_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-please-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: books-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./uploads:/srv/uploads:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
