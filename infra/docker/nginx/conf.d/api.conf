# Books Management System -- nginx reverse proxy
# Serves the deployed stack at https://books.9962510.xyz
#
# Two server blocks:
#   1. catch-all on :80 -> redirect to canonical https host
#      (also serves /.well-known/acme-challenge/ for certbot HTTP-01)
#   2. canonical https on :443 with HSTS + the three upstreams
#
# When the certificate files are not mounted (dev / first boot), the :443
# block is silently skipped because nginx fails-fast on missing files;
# use docker-compose.yml's `nginx-tls` profile flag (or Caddy alternative
# at infra/deploy/caddy/Caddyfile) to control rollout.

upstream books_api {
    server api:8000;
    keepalive 32;
}

upstream books_admin {
    server admin-web:3000;
    keepalive 32;
}

upstream books_reader {
    server reader-web:3001;
    keepalive 32;
}

# --- HTTP :80 ---------------------------------------------------------
# 1. Serves ACME HTTP-01 challenges for certbot.
# 2. Permanently redirects everything else to https on the canonical host.

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  books.9962510.xyz _;

    # Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Health probe stays plain-HTTP so docker-compose / load balancers can
    # reach it without TLS.
    location = /health {
        access_log off;
        proxy_pass http://books_api/health;
    }

    location / {
        return 301 https://books.9962510.xyz$request_uri;
    }
}

# --- HTTPS :443 -------------------------------------------------------
# Only loaded when /etc/nginx/certs/books.9962510.xyz/ exists (mounted by
# compose). nginx will refuse to start if these files are missing -- start
# with the `bootstrap` profile (HTTP-only) for first-time issuance, then
# switch to the `tls` profile.

server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    http2        on;
    server_name  books.9962510.xyz;

    ssl_certificate     /etc/nginx/certs/books.9962510.xyz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/books.9962510.xyz/privkey.pem;

    # Modern TLS: TLS 1.2 + 1.3, AEAD ciphers only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 512m;

    # Backend API
    location /api/ {
        proxy_pass http://books_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location = /health {
        access_log off;
        proxy_pass http://books_api/health;
    }

    # /metrics is internal-only by default; uncomment the allow lines once
    # your scraper IP / network range is known.
    location = /metrics {
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;
        proxy_pass http://books_api/metrics;
    }

    location = /docs        { proxy_pass http://books_api/docs; }
    location = /openapi.json { proxy_pass http://books_api/openapi.json; }

    # Admin console at /admin
    location /admin/ {
        proxy_pass http://books_admin/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # Reader at root
    location / {
        proxy_pass http://books_reader;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # Static uploads served read-only directly by nginx
    location /uploads/ {
        alias /srv/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
