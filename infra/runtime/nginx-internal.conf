user  www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events { worker_connections 256; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 512m;

    # Local upstreams — all three Python/Node processes run inside this
    # same container under supervisord, listening on loopback.
    upstream books_api    { server 127.0.0.1:8000; keepalive 16; }
    upstream books_admin  { server 127.0.0.1:3000; keepalive 16; }
    upstream books_reader { server 127.0.0.1:3001; keepalive 16; }

    log_format kv '$remote_addr "$request" $status $body_bytes_sent';
    access_log /dev/stdout kv;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # Backend
        location /api/ {
            proxy_pass http://books_api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
        location = /health        { proxy_pass http://books_api/health;        access_log off; }
        location = /metrics       { proxy_pass http://books_api/metrics;       }
        location = /docs          { proxy_pass http://books_api/docs;          }
        location = /openapi.json  { proxy_pass http://books_api/openapi.json;  }

        # Admin console at /admin/
        location ^~ /admin {
            proxy_pass http://books_admin;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }

        # Static covers / uploads -- served straight from disk
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # Reader at root
        location / {
            proxy_pass http://books_reader;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }
    }
}
