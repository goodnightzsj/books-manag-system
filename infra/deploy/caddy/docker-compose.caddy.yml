# Drop-in replacement for the nginx service -- automatic Let's Encrypt.
#
# Use:
#   docker compose -f docker-compose.yml -f infra/deploy/caddy/docker-compose.caddy.yml \
#     up -d
#
# Caddy listens on 80/443 and obtains certs on first boot. Make sure
# books.9962510.xyz resolves to this host BEFORE starting Caddy, otherwise
# the HTTP-01 challenge fails.

services:
  nginx:
    profiles: ["disabled-by-caddy"]

  caddy:
    image: caddy:2-alpine
    container_name: books-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ../../deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../../uploads:/srv/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - admin-web
      - reader-web

volumes:
  caddy_data:
  caddy_config:
