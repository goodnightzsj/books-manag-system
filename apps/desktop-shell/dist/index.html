<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Books Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="0; url=https://books.9962510.xyz/">
<style>
  html, body { margin: 0; height: 100%; background: #FBF7EE; color: #18181B;
    font-family: "Source Serif 4", Georgia, serif; }
  main { display: grid; place-items: center; height: 100%; gap: 12px; padding: 24px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.012em; margin: 0; }
  h1 .dot { color: #B4502A; }
  p { color: #57534E; font-size: 14px; margin: 0; }
  a { color: #B4502A; }
</style>
<script>
  // immediate redirect when JS is on (most users)
  if (typeof window !== "undefined") {
    window.location.replace("https://books.9962510.xyz/");
  }
</script>
</head>
<body>
<main>
  <h1>books<span class="dot">.</span></h1>
  <p>正在打开你的书库…</p>
  <p><a href="https://books.9962510.xyz/">如果没有自动跳转，点这里</a></p>
</main>
</body>
</html>
