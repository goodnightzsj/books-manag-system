# Production overlay -- pulls pre-built images from Docker Hub instead of
# building locally. Combine with the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Override `IMAGE_TAG` in `.env` to pin a specific release; defaults to `latest`.
# `IMAGE_NAMESPACE` defaults to `helloworldz1024` -- change for forks.

services:
  api:
    image: ${IMAGE_NAMESPACE:-helloworldz1024}/books-manag-system-backend:${IMAGE_TAG:-latest}
    build: !reset null
    pull_policy: always

  worker:
    image: ${IMAGE_NAMESPACE:-helloworldz1024}/books-manag-system-backend:${IMAGE_TAG:-latest}
    build: !reset null
    pull_policy: always

  beat:
    image: ${IMAGE_NAMESPACE:-helloworldz1024}/books-manag-system-backend:${IMAGE_TAG:-latest}
    build: !reset null
    pull_policy: always

  admin-web:
    image: ${IMAGE_NAMESPACE:-helloworldz1024}/books-manag-system-admin-web:${IMAGE_TAG:-latest}
    build: !reset null
    pull_policy: always

  reader-web:
    image: ${IMAGE_NAMESPACE:-helloworldz1024}/books-manag-system-reader-web:${IMAGE_TAG:-latest}
    build: !reset null
    pull_policy: always
